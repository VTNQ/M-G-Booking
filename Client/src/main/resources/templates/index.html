<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue.js Example</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app">
    <!-- Binding message from Vue -->
    <h1>{{ message }}</h1>

    <!-- Example button to change message -->
    <button @click="updateMessage">Change Message</button>
</div>

<script>
    // Initialize Vue app
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                message: 'Hello, Vue!'
            };
        },
        methods: {
            updateMessage() {
                this.message = 'Message Updated!';
            }
        }
    }).mount('#app');
</script>
</body>
</html>

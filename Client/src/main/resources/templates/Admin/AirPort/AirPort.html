<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/Admin/layout :: mainContent('AirPort',~{this::.content-wrapper})}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div class="content-wrapper">
    <!-- Content -->

    <div class="container-xxl flex-grow-1 container-p-y">

        <div class="row ">
            <!-- Form controls -->


            <!-- Input Sizing -->
            <div class="col-md-12">
                <form th:action="@{/Admin/AirPort}" method="post">
                    <div class="card">

                        <div class="card-body">
                            <h5>AirPort</h5>
                            <div class="mt-2 mb-4">
                                <label class="form-label">Name</label>
                                <input th:field="${Airport.name}"
                                       id="largeInput"
                                       class="form-control form-control-lg"
                                       type="text"
                                       placeholder="Name"/>
                            </div>
                            <div class="mt-2 mb-4">
                                <label  class="form-label">Country</label>
                                <select class="form-control " th:field="${Airport.city_id}">
                                    <option th:each="Cities : ${City}" th:value="${Cities.id}"
                                            th:text="${Cities.name}"></option>
                                </select>
                            </div>

                        </div>


                        <div class="card-footer">
                            <button type="submit" class="btn btn-outline-primary">Save</button>


                        </div>
                    </div>
                </form>

            </div>

            <!-- Default Checkboxes and radios & Default checkboxes and radios -->

        </div>

    </div>
    <div class="container-xxl flex-grow-1 container-p-y">
        <div class="row">
            <div class="card">
                <h5 class="card-header">Danh sach AirPort</h5>
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="searchAirPort" class="form-control"
                               placeholder="Search for AirPort" onkeyup="SearchAirport()">
                    </div>
                </div>
                <div class="table-responsive text-nowrap">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>City</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody class="table-border-bottom-0" id="AirPortTableBody">

                        </tbody>
                    </table>
                    <div id="paginationControls">
                        <ul class="pagination">
                            <!-- Previous Button -->
                            <li class="page-item">
                                <button id="prevPage" class="page-link" disabled>Previous</button>
                            </li>

                            <!-- Page Number Buttons (Dynamic) -->
                            <li class="page-item">
                                <span id="pageNumbers" class="page-link">1</span>
                            </li>

                            <!-- Next Button -->
                            <li class="page-item">
                                <button id="nextPage" class="page-link">Next</button>
                            </li>
                        </ul>
                    </div>
                    <div id="token" style="display: none" th:text="${token}"></div>
                    <div id="IdCountry" style="display: none" th:text="${IdCountry}"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- / Content -->

    <!-- Footer -->
    <footer class="content-footer footer bg-footer-theme">
        <div class="container-xxl">
            <div
                    class="footer-container d-flex align-items-center justify-content-between py-4 flex-md-row flex-column">
                <div class="text-body mb-2 mb-md-0">
                    ©
                    <script>
                        document.write(new Date().getFullYear());
                    </script>
                    , made with <span class="text-danger"><i class="tf-icons ri-heart-fill"></i></span> by
                    <a href="https://themeselection.com" target="_blank" class="footer-link">ThemeSelection</a>
                </div>
                <div class="d-none d-lg-inline-block">
                    <a href="https://themeselection.com/license/" class="footer-link me-4" target="_blank">License</a>
                    <a href="https://themeselection.com/" target="_blank" class="footer-link me-4">More Themes</a>

                    <a
                            href="https://demos.themeselection.com/materio-bootstrap-html-admin-template/documentation/"
                            target="_blank"
                            class="footer-link me-4"
                    >Documentation</a
                    >

                    <a
                            href="https://github.com/themeselection/materio-bootstrap-html-admin-template-free/issues"
                            target="_blank"
                            class="footer-link"
                    >Support</a
                    >
                </div>
            </div>
        </div>
    </footer>
    <!-- / Footer -->

    <div class="content-backdrop fade"></div>
    <script th:fragment="customScripts" th:src="@{/Admin/AirPortTable/AirPortTable.js}"></script>
</div>


</body>
</html>

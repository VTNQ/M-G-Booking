<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    document.querySelectorAll('.dropdown-item').forEach(item=>{
        item.addEventListener('click',function (){
            const langCode=this.getAttribute('data-lang-code');
            translateContent(langCode)
        });
    });
    document.querySelectorAll('#languageDropdown .dropdown-item').forEach(item => {
        item.addEventListener('click', function() {
            // Get the text of the clicked item
            const selectedLanguage = this.textContent;

            // Update the span with the selected language
            document.getElementById('selectedLanguage').textContent = selectedLanguage;

            // Remove 'active' class from all items
            document.querySelectorAll('#languageDropdown .dropdown-item').forEach(i => {
                i.classList.remove('active');
            });

            // Add 'active' class to the clicked item
            this.classList.add('active');

            // Optionally hide the dropdown after selection
            document.getElementById('languageDropdown').style.display = 'none';
        });
    });

    function translateContent(langCode) {
        const translationKeys = {
            SignRegister: 'SignRegister' // Add other keys here if needed
        };

        const promises = Object.keys(translationKeys).map(key =>
            fetch(`http://localhost:8686/Language/translate?langCode=${langCode}&key=${key}`)
                .then(response => {
                    console.log(response)
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.text(); // Assuming the response is plain text
                })
                .then(translation => {
                    console.log(`Translation for ${key}: ${translation}`);
                    const element = document.querySelector(`[data-translate-key="${key}"]`);
                    if (element) {
                        element.textContent = translation; // Update the text content of the matched element
                    } else {
                        console.warn(`No element found for key: ${key}`);
                    }
                })
                .catch(error => {
                    console.error(`Error fetching translation for key "${key}":`, error);
                })
        );

// Wait for all promises to resolve or reject
        Promise.all(promises)
            .then(() => {
                console.log('All translations fetched successfully.');
            })
            .catch(error => {
                console.error('Error in fetching translations:', error);
            });
    }
</script>
